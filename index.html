<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAKSENT | Nexory Signature</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --red: #FF0000;
            --black: #000000;
            --dark-gray: #0D0D0D;
            --border-color: #1A1A1A;
            --text-main: #FFFFFF;
            --text-dim: #777777;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--black);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* Header Animacije */
        .header { 
            text-align: center; 
            margin-bottom: 40px; 
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }
        
        .logo-wrapper {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto 20px;
            transition: transform 0.3s ease;
        }
        
        .logo-wrapper:hover { transform: scale(1.05); }

        .main-logo {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid var(--red);
            padding: 4px;
        }

        .verified {
            position: absolute; bottom: 5px; right: 5px;
            background: #0095f6; width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 10px; display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--black);
        }

        .brand-name {
            font-size: 32px; font-weight: 900;
            letter-spacing: -1px; text-transform: uppercase;
            margin-bottom: 10px;
        }

        .status-pill {
            display: inline-flex; align-items: center;
            border: 1px solid #00FF00; color: #00FF00;
            padding: 5px 12px; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .pulse-dot {
            width: 6px; height: 6px; background: #00FF00;
            border-radius: 50%; margin-right: 8px;
            animation: blink 1.5s infinite;
        }

        /* Hero Image */
        .cover-section {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards 0.2s;
        }

        .cover-box {
            position: relative;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .cover-img { width: 100%; display: block; transition: transform 0.5s ease; }
        .cover-box:hover .cover-img { transform: scale(1.03); }
        
        .cover-label {
            position: absolute; top: 0; left: 0;
            background: var(--red); color: white;
            padding: 6px 12px; font-weight: 900; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px;
            z-index: 2;
        }

        .motto { text-align: left; margin-bottom: 40px; border-left: 3px solid var(--red); padding-left: 15px; }
        .motto p { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .highlight { color: white; font-weight: 700; display: block; font-size: 18px; margin-top: 5px; }

        /* Navigacija - Dodati efekti klika */
        .links-grid { 
            display: grid; gap: 1px; background: var(--border-color); border: 1px solid var(--border-color); 
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards 0.4s;
        }
        
        .link-card { 
            text-decoration: none; color: white; background: var(--black); 
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        /* Efekat pritiska na dugme */
        .link-card:active {
            transform: scale(0.98);
            background: var(--dark-gray);
        }

        .link-content {
            min-height: 85px;
            padding: 20px;
            display: flex; align-items: center;
            transition: background 0.3s;
        }

        .link-card:hover .link-content {
            background: #080808;
        }

        .icon-box {
            width: 40px; font-size: 20px; margin-right: 20px; 
            display: flex; justify-content: center; color: var(--red);
            transition: transform 0.3s ease;
        }

        .link-card:hover .icon-box { transform: translateX(3px); }

        .text-box h3 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .text-box span { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .arrow { margin-left: auto; font-size: 12px; color: #333; transition: transform 0.3s ease; }
        .link-card:hover .arrow { transform: translateX(5px); color: var(--red); }

        /* Modal sa animacijom */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            display: none; justify-content: center; align-items: center;
            z-index: 9999; padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-body {
            background: var(--black);
            width: 100%; max-width: 400px;
            border: 1px solid var(--border-color);
            padding: 40px 25px;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-body { transform: scale(1); opacity: 1; }

        .modal-header { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: var(--red); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        
        .form-group input, .form-group select {
            width: 100%; padding: 15px;
            background: var(--dark-gray);
            border: 1px solid var(--border-color);
            border-radius: 0; color: white;
            font-size: 16px; outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus { border-color: var(--red); }

        .submit-trigger {
            width: 100%; padding: 18px;
            background: var(--red); color: white;
            border: none; font-weight: 900; font-size: 14px;
            text-transform: uppercase; cursor: pointer;
            transition: all 0.2s;
        }

        .submit-trigger:active { transform: scale(0.95); opacity: 0.8; }

        /* Nexory Footer */
        .nexory-footer {
            margin-top: 80px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards 0.6s;
        }

        .nexory-footer p { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 12px; }
        .nexory-text {
            font-size: 22px; font-weight: 900; letter-spacing: 4px;
            color: #fff; text-decoration: none; display: inline-block;
            transition: transform 0.3s;
        }
        .nexory-text:hover { transform: translateY(-3px); }
        .nexory-text span { color: var(--red); }

        /* Ključne Animacije */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink { 50% { opacity: 0.3; } }

    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-wrapper">
                <img src="img/logo.png" alt="Daksent" class="main-logo">
                <div class="verified"><i class="fas fa-check"></i></div>
            </div>
            <h1 class="brand-name">DAKSENT</h1>
            <div class="status-pill">
                <div class="pulse-dot"></div>
                Dostupni online termini
            </div>
        </header>

        <section class="cover-section">
            <div class="cover-box">
                <img src="img/cover.png" alt="Premium Detailing" class="cover-img">
                <div class="cover-label">Premium Usluga</div>
            </div>
            <div class="motto">
                <p>Studio za negu automobila</p>
                <span class="highlight">Vraćamo fabrički sjaj vašem vozilu.</span>
            </div>
        </section>

        <nav class="links-grid">
            <a href="#" class="link-card" id="openBooking">
                <div class="link-content">
                    <div class="icon-box"><i class="fas fa-calendar-check"></i></div>
                    <div class="text-box">
                        <h3>Zakaži Termin</h3>
                        <span>Brza online rezervacija</span>
                    </div>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>
            </a>

            <a href="#" class="link-card">
                <div class="link-content">
                    <div class="icon-box"><i class="fas fa-images"></i></div>
                    <div class="text-box">
                        <h3>Galerija Radova</h3>
                        <span>Naše transformacije</span>
                    </div>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>
            </a>

            <a href="https://instagram.com/daksent.detailing" target="_blank" class="link-card">
                <div class="link-content">
                    <div class="icon-box"><i class="fab fa-instagram"></i></div>
                    <div class="text-box">
                        <h3>Instagram</h3>
                        <span>Pratite @daksent.detailing</span>
                    </div>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>
            </a>

            <a href="mailto:daniloaksentijevic009@gmail.com" class="link-card">
                <div class="link-content">
                    <div class="icon-box"><i class="fas fa-paper-plane"></i></div>
                    <div class="text-box">
                        <h3>Kontakt</h3>
                        <span>Pošaljite nam upit</span>
                    </div>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>
            </a>
        </nav>

        <footer class="nexory-footer">
            <p>DIZAJN I IZRADA</p>
            <a href="https://nexory.agency" target="_blank" class="nexory-text">NEXORY<span>.</span></a>
        </footer>
    </div>

    <div class="modal-overlay" id="bookingModal">
        <div class="modal-body">
            <div class="modal-header">
                <h2 style="font-size: 16px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;">Rezervacija</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="bookingForm" action="https://formspree.io/f/daniloaksentijevic009@gmail.com" method="POST">
                <div class="form-group">
                    <label>Ime i Prezime</label>
                    <input type="text" name="Ime" required placeholder="Marko Marković">
                </div>
                
                <div class="form-group">
                    <label>Vozilo (Model i Godište)</label>
                    <input type="text" name="Vozilo" required placeholder="npr. BMW M3 2021">
                </div>

                <div class="form-group">
                    <label>Izaberite Usluga</label>
                    <select name="Usluga" required>
                        <option value="">Izaberite paket...</option>
                        <option value="Enterijer">Enterijer (599 RSD)</option>
                        <option value="Exterijer">Exterijer (799 RSD)</option>
                        <option value="Farovi">Farovi (2499 RSD)</option>
                        <option value="FULL">FULL PAKET (3499 RSD)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Željeni Datum i Vreme</label>
                    <input type="datetime-local" name="Vreme" required>
                </div>

                <button type="submit" class="submit-trigger">Potvrdi Rezervaciju</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('bookingModal');
            const openBtn = document.getElementById('openBooking');
            const closeBtn = document.querySelector('.close-btn');

            openBtn.addEventListener('click', (e) => {
                e.preventDefault();
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            });

            const closeModal = () => {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            };

            closeBtn.addEventListener('click', closeModal);
            window.addEventListener('click', (e) => { 
                if (e.target === modal) closeModal(); 
            });

            // Suptilna haptika za mobilni (ako podržava)
            const links = document.querySelectorAll('.link-card, .submit-trigger');
            links.forEach(link => {
                link.addEventListener('touchstart', () => {
                    if (window.navigator.vibrate) window.navigator.vibrate(5);
                });
            });
        });
    </script>
</body>
</html>
